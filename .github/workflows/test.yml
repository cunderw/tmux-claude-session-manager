name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bats:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core, jq, fzf, tmux
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew install bats-core jq fzf tmux
          else
            sudo apt-get update
            sudo apt-get install -y bats jq fzf tmux
          fi
          tmux -V
          bats --version

      - name: Run tests
        run: bin/run_tests

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          format: gcc
          severity: warning
          ignore_paths: tests/fixtures tests/stubs
